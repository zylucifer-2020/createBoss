<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss蒸馏 - Demo演示</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            max-width: 720px;
            width: 100%;
            text-align: center;
            padding: 30px 20px;
        }

        /* Brand */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            font-size: 2rem;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: #ff6b35;
        }

        .tagline {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-family: 'JetBrains Mono', monospace;
        }

        .tagline::before {
            content: '⟩ ';
            color: #ff6b35;
        }

        /* Video */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
            box-shadow:
                0 0 0 1px rgba(255, 107, 53, 0.15),
                0 20px 60px -10px rgba(0, 0, 0, 0.8),
                0 0 100px -20px rgba(255, 107, 53, 0.1);
        }

        video {
            width: 100%;
            display: block;
            max-height: 70vh;
            object-fit: contain;
            background: #000;
        }

        /* Controls hint */
        .controls-hint {
            margin-top: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #555;
        }

        .controls-hint kbd {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 0.7rem;
            color: #888;
        }

        /* Links */
        .links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #333;
            border-radius: 8px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            border-color: #ff6b35;
            color: #ff6b35;
            background: rgba(255, 107, 53, 0.05);
        }

        .link-btn svg {
            width: 16px;
            height: 16px;
        }

        .link-btn.primary {
            border-color: #ff6b35;
            color: #ff6b35;
        }

        .link-btn.primary:hover {
            background: #ff6b35;
            color: #fff;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #444;
            font-family: 'JetBrains Mono', monospace;
        }

        .footer a {
            color: #666;
            text-decoration: none;
        }

        .footer a:hover {
            color: #ff6b35;
        }

        @media (max-width: 600px) {
            .brand-name { font-size: 1.2rem; }
            .tagline { font-size: 0.8rem; }
            .container { padding: 20px 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <span class="brand-icon">🧬</span>
            <div class="brand-name">Boss<span>蒸馏</span></div>
        </div>
        <div class="tagline">Put Your Boss "Into" AI</div>

        <div class="video-wrapper">
            <video id="demoVideo" controls autoplay playsinline>
                <source src="https://github.com/zylucifer-2020/createBoss/releases/download/v1.0.0/createboss.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>

        <div class="controls-hint">
            <kbd>Space</kbd> 暂停/播放 &nbsp; <kbd>F</kbd> 全屏
        </div>

        <div class="links">
            <a href="https://github.com/zylucifer-2020/createBoss" class="link-btn primary">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </a>
            <a href="https://github.com/zylucifer-2020/createBoss/releases/download/v1.0.0/createboss.mp4" class="link-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                下载视频
            </a>
        </div>

        <div class="footer">
            built with 🦞 by <a href="https://github.com/zylucifer-2020">zylucifer</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('demoVideo');

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                video.paused ? video.play() : video.pause();
            }
            if (e.code === 'KeyF') {
                if (video.requestFullscreen) video.requestFullscreen();
                else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
            }
        });

        // Auto-play with sound
        video.play().catch(() => {
            // If browser blocks autoplay with sound, try again on user interaction
            document.addEventListener('click', () => { video.play(); }, { once: true });
        });
    </script>
</body>
</html>
